version: '3.8'

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque-app-prod
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://root:senha123@mysql:3306/estoque_db
    volumes:
      - ./instance:/app/instance
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - mysql
    networks:
      - estoque-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: estoque-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: senha123
      MYSQL_DATABASE: estoque_db
      MYSQL_USER: estoque_user
      MYSQL_PASSWORD: senha123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - estoque-network

volumes:
  mysql_data:
    driver: local

networks:
  estoque-network:
    driver: bridge
