version: '3.8'

services:
  # Aplicação Flask (produção)
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque-app-prod
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///estoque.db
    volumes:
      - ./instance:/app/instance
    ports:
      - "5000:5000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
