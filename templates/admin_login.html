<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sistema de Gestão do TI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, rgba(189, 154, 95, 0.18), transparent 35%), linear-gradient(135deg, #11141b 0%, #2d3748 100%);
            padding: 1rem;
        }
        .login-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.28);
            overflow: hidden;
            width: 100%;
            max-width: 460px;
        }
        .login-header {
            background: #dc3545;
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0;
        }
        .login-header p {
            margin: 0.5rem 0 0 0;
            font-size: 0.95rem;
            font-weight: 300;
            opacity: 0.95;
        }
        .login-body {
            padding: 1.5rem;
        }
        .btn-login {
            background: #dc3545;
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-login:hover {
            background: #bb2d3b;
            transform: translateY(-2px);
            color: white;
        }
        .btn-back {
            color: #6c757d;
            border-color: #6c757d;
        }
        .btn-back:hover {
            background-color: #6c757d;
            border-color: #6c757d;
            color: white;
        }
        .form-control:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
        }
        .alert {
            margin-bottom: 1rem;
        }
        @media (min-width: 576px) {
            .login-header {
                padding: 2.5rem 2rem;
            }
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 0.75rem;
                align-items: flex-start;
            }

            .login-card {
                border-radius: 16px;
                max-width: 100%;
                margin-top: 1rem;
            }

            .login-header {
                padding: 1.5rem 1.25rem;
            }

            .login-header h2 {
                font-size: 1.1rem;
            }

            .login-header p {
                font-size: 0.9rem;
            }

            .login-body {
                padding: 1.25rem;
            }

            .btn-login,
            .btn-back {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-shield-alt" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
                <h2>Acesso de Administrador</h2>
                <p>Login exclusivo para administradores</p>
            </div>
            <div class="login-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else 'info' }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Nome de usuário
                        </label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            required
                            autofocus
                            placeholder="username"
                        >
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Senha
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            required
                            placeholder="••••••••"
                        >
                    </div>
                    
                    <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-login btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Entrar como Admin
                        </button>
                    </div>
                </form>

                <div class="d-grid">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-arrow-left"></i> Voltar para Login Principal
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
