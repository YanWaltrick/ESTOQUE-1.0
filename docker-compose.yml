version: '3.8'

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque-app
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DATABASE_URL=mysql+pymysql://root:senha123@mysql:3306/estoque_db
    volumes:
      - .:/app
      - ./instance:/app/instance
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    command: python app.py
    networks:
      - estoque-network

  mysql:
    image: mysql:8.0
    container_name: estoque-mysql
    environment:
      MYSQL_ROOT_PASSWORD: senha123
      MYSQL_DATABASE: estoque_db
      MYSQL_USER: estoque_user
      MYSQL_PASSWORD: senha123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - estoque-network

volumes:
  mysql_data:
    driver: local

networks:
  estoque-network:
    driver: bridge
